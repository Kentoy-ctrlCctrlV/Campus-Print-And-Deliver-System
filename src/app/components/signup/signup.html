<div class="signup-container">
  <!-- Student Login Section -->
  <div *ngIf="!isAdminMode" class="login-section">
    <h2>Student Sign Up</h2>
    <form (ngSubmit)="onSubmit()">
      <label for="name">Name</label>
      <input
        id="name"
        name="name"
        type="text"
        [(ngModel)]="studentName"
        placeholder="Enter your full name"
        required
      />

      <label for="email">Email or Phone</label>
      <input
        id="email"
        name="email"
        type="text"
        [(ngModel)]="studentEmailOrPhone"
        placeholder="Enter your email or phone number"
        required
      />

      <button type="submit" class="submit-btn">Continue to Dashboard</button>
    </form>

    <!-- Admin Login Toggle -->
    <div class="admin-toggle">
      <p>Are you an administrator?</p>
      <button
        type="button"
        class="toggle-btn"
        (click)="toggleAdminMode()"
      >
        Log in as an Admin
      </button>
    </div>
  </div>

  <!-- Admin Login Section -->
  <div *ngIf="isAdminMode" class="login-section admin-section">
    <h2>Admin Login</h2>

    <!-- Error message -->
    <div *ngIf="adminLoginError" class="error-message">
      <p>{{ adminLoginError }}</p>
    </div>

    <form [formGroup]="adminForm" (ngSubmit)="onAdminLogin()">
      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        formControlName="username"
        placeholder="Enter your admin username"
        required
      />
      <small
        *ngIf="
          adminForm.get('username')?.invalid &&
          adminForm.get('username')?.touched
        "
        class="error-text"
      >
        Username is required and must be at least 3 characters
      </small>

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        formControlName="password"
        placeholder="Enter your admin password"
        required
      />
      <small
        *ngIf="
          adminForm.get('password')?.invalid &&
          adminForm.get('password')?.touched
        "
        class="error-text"
      >
        Password is required and must be at least 6 characters
      </small>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="adminForm.invalid || isAdminLoading"
      >
        {{ isAdminLoading ? 'Logging in...' : 'Admin Login' }}
      </button>
    </form>

    <!-- Back to Student Login -->
    <div class="admin-toggle">
      <p>Not an admin?</p>
      <button
        type="button"
        class="toggle-btn"
        (click)="toggleAdminMode()"
      >
        Back to Student Sign Up
      </button>
    </div>

    <!-- Demo Credentials (for testing) -->
    <div class="demo-credentials">
      <p><strong>Demo Admin Credentials:</strong></p>
      <p>Username: <code>admin</code></p>
      <p>Password: <code>admin123</code></p>
    </div>
  </div>
</div>
