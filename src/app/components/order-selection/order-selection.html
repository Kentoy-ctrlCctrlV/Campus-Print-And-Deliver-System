<div class="order-page">
  <h2>New Print Order</h2>

  <section class="form-group">
    <label>Drag and Drop PDF/DOCS</label>
    <input type="file" (change)="onFileChange($event)" multiple accept=".pdf,.doc,.docx" />
    <ul class="file-list">
      <li *ngFor="let f of files">{{ f.name }} ({{ f.sizeInBytes }} bytes)</li>
    </ul>
  </section>

  <h3>Print Options</h3>
  <div class="options-grid">
    <div class="field">
      <label>Mode</label>
      <select [(ngModel)]="printMode">
        <option value="bw">Black & White</option>
        <option value="color">Color</option>
      </select>
    </div>

    <div class="field">
      <label>Paper Size</label>
      <select [(ngModel)]="paperSize">
        <option value="A4">A4</option>
        <option value="short">Short</option>
        <option value="long">Long</option>
      </select>
    </div>

    <div class="field">
      <label>Copies</label>
      <input type="number" [(ngModel)]="copies" min="1" />
    </div>

    <div class="field">
      <label>Pages per Copy</label>
      <input type="number" [(ngModel)]="pagesPerCopy" min="1" />
    </div>
  </div>

  <h3>Delivery</h3>
  <input type="text" [(ngModel)]="deliveryBuilding" placeholder="Campus Building (e.g. Admin, Library)" />

  <h3>Payment</h3>
  <div class="payment-options">
    <label><input type="radio" name="payment" value="gcash" [(ngModel)]="paymentMethod" />GCash</label>
    <label><input type="radio" name="payment" value="cod" [(ngModel)]="paymentMethod" /> Cash on Delivery</label>
  </div>

  <div *ngIf="paymentMethod === 'gcash'" class="payment-section">
    <p class="payment-instr">Scan to pay for your order</p>
    <div class="qr-container">
      <img src="/kzgcashqr.jpg" alt="GCash QR Code">
    </div>
    <div class="qr-note">
      <p><strong>KE*T AN***W Z.</strong></p>
      <p>+63 994 445 3342</p>
      <p class="small-id">User ID: ...82W2HZ</p>
    </div>
  </div>

  <label>Notes (optional)</label>
  <textarea [(ngModel)]="notes" placeholder="Any special instructions?"></textarea>

  <button class="submit-btn" (click)="submitOrder()">Submit Order</button>
</div>

<style>
  .order-page {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    color: #333;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  input, select, textarea {
    width: 100%;
    padding: 0.8rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-top: 0.4rem;
  }

  .payment-options {
    display: flex;
    gap: 1.5rem;
    margin: 0.5rem 0;
  }

  /* Shrunken GCash Section */
  .payment-section { 
    background: #f8fafc; 
    border-radius: 12px; 
    padding: 1.2rem; 
    border: 1px dashed #cbd5e1;
    margin: 1rem auto; 
    max-width: 280px; /* Compact width */
    text-align: center;
  }

  .payment-instr {
    font-size: 0.85rem;
    color: #64748b;
    margin-bottom: 0.8rem;
  }

  .qr-container { 
    display: flex; 
    justify-content: center; 
    margin-bottom: 0.8rem;
  }
  
  .qr-container img { 
    max-width: 140px; /* 2x smaller than original */
    height: auto; 
    border-radius: 8px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .qr-note { font-size: 0.8rem; color: #1e293b; line-height: 1.3; }
  .small-id { font-size: 0.7rem; color: #94a3b8; }

  .submit-btn {
    background: #1e3c72;
    color: white;
    padding: 1rem;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1rem;
  }

  .submit-btn:hover { background: #2a5298; }
</style>
