version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: campus-print-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: campus_print_deliver
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campus-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Adminer for database management UI
  adminer:
    image: adminer:latest
    container_name: campus-print-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - campus-network

volumes:
  mysql_data:
    driver: local

networks:
  campus-network:
    driver: bridge
